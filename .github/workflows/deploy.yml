name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          SERVER=$(echo "$FTP_SERVER" | tr -d '[:space:]' | sed 's|^ftps\?://||' | sed 's|/$||')
          DIR=$(echo "$FTP_SERVER_DIR" | tr -d '[:space:]' | sed 's|^/||' | sed 's|/$||')
          find . -type f \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -name '.gitignore' \
            | while IFS= read -r file; do
              remote="${file#./}"
              echo "Uploading: $remote"
              curl --silent --show-error \
                --ftp-pasv \
                --ftp-create-dirs \
                --connect-timeout 30 \
                --max-time 120 \
                -u "$FTP_USERNAME:$FTP_PASSWORD" \
                -T "$file" \
                "ftp://$SERVER/$DIR/$remote"
            done
          echo "Deploy complete."
