name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: SFTP probe
        env:
          SFTP_SERVER: ${{ secrets.FTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          SERVER=$(echo "$SFTP_SERVER" | tr -d '[:space:]' | sed 's|^ftps\?://||' | sed 's|/$||')
          printf 'pwd\nls\nbye\n' > /tmp/probe.batch
          sshpass -p "$SFTP_PASSWORD" sftp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -b /tmp/probe.batch \
            "$SFTP_USERNAME@$SERVER"

      - name: Deploy via SFTP
        env:
          SFTP_SERVER: ${{ secrets.FTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SFTP_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          SERVER=$(echo "$SFTP_SERVER" | tr -d '[:space:]' | sed 's|^ftps\?://||' | sed 's|/$||')
          DIR=$(echo "$SFTP_DIR" | tr -d '[:space:]' | sed 's|^/||' | sed 's|/$||')

          BATCH=$(mktemp)
          {
            echo "cd $DIR"
            find . -type d \
              ! -path './.git*' \
              ! -path './.github*' \
              ! -name '.' \
              | while IFS= read -r d; do
                echo "-mkdir ${d#./}"
              done
            find . -type f \
              ! -path './.git/*' \
              ! -path './.github/*' \
              ! -name '.gitignore' \
              | while IFS= read -r file; do
                echo "put $file ${file#./}"
              done
            echo "bye"
          } > "$BATCH"

          echo "--- SFTP batch preview (first 20 lines) ---"
          head -20 "$BATCH"
          echo "--------------------------------------------"

          sshpass -p "$SFTP_PASSWORD" sftp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -b "$BATCH" \
            "$SFTP_USERNAME@$SERVER"

          echo "Deploy complete."
