name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SFTP
        env:
          SFTP_SERVER: ${{ secrets.FTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          SFTP_DIR: ${{ secrets.FTP_SERVER_DIR }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          SERVER=$(echo "$SFTP_SERVER" | tr -d '[:space:]' | sed 's|^ftps\?://||' | sed 's|/$||')
          DIR=$(echo "$SFTP_DIR" | tr -d '[:space:]' | sed 's|^/||' | sed 's|/$||')

          # Write SSH key
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "Key header: $(head -1 ~/.ssh/id_rsa)"
          echo "Key line count: $(wc -l < ~/.ssh/id_rsa)"
          ssh-keygen -l -f ~/.ssh/id_rsa 2>&1 || echo "Key validation failed"

          echo "=== SSH verbose auth test ==="
          ssh -vvv \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o BatchMode=yes \
            -i ~/.ssh/id_rsa \
            "$SFTP_USERNAME@$SERVER" echo ok > /tmp/ssh_debug.txt 2>&1 || true
          grep -iE "(offering|accepted|server accept|denied|login|user|pubkey|authenticat)" /tmp/ssh_debug.txt | head -30
          echo "=== end auth test ==="

          BATCH=$(mktemp)
          {
            echo "cd $DIR"
            find . -type d \
              ! -path './.git*' \
              ! -path './.github*' \
              ! -name '.' \
              | while IFS= read -r d; do
                echo "-mkdir ${d#./}"
              done
            find . -type f \
              ! -path './.git/*' \
              ! -path './.github/*' \
              ! -name '.gitignore' \
              | while IFS= read -r file; do
                echo "put $file ${file#./}"
              done
            echo "bye"
          } > "$BATCH"

          sftp -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -b "$BATCH" \
            "$SFTP_USERNAME@$SERVER"

          echo "Deploy complete."
