name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cPanel Git pull
        env:
          CPANEL_WEBHOOK: ${{ secrets.CPANEL_WEBHOOK }}
        run: |
          if [ -n "$CPANEL_WEBHOOK" ]; then
            curl -s "$CPANEL_WEBHOOK"
            echo "Deploy triggered."
          else
            echo "CPANEL_WEBHOOK secret not set — deploy manually in cPanel Git Version Control."
          fi
