name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: FTP debug probe
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          SERVER=$(echo "$FTP_SERVER" | tr -d '[:space:]' | sed 's|^ftps\?://||' | sed 's|/$||')
          echo "=== FTP debug trace ==="
          lftp -d -u "$FTP_USERNAME","$FTP_PASSWORD" \
            -e "set ftp:ssl-allow no; set ftp:passive-mode true; set net:timeout 30; ls; bye" \
            ftp://$SERVER 2>&1 | head -80
          echo "=== end trace ==="

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          SERVER=$(echo "$FTP_SERVER" | tr -d '[:space:]' | sed 's|^ftps\?://||' | sed 's|/$||')
          DIR=$(echo "$FTP_SERVER_DIR" | tr -d '[:space:]' | sed 's|^/||' | sed 's|/$||')

          # Build lftp script: one connection, mkdir + put per file
          SCRIPT=$(mktemp)
          {
            echo "set ftp:ssl-allow no"
            echo "set ftp:passive-mode true"
            echo "set net:timeout 60"
            echo "open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" ftp://$SERVER"
            find . -type f \
              ! -path './.git/*' \
              ! -path './.github/*' \
              ! -name '.gitignore' \
              | while IFS= read -r file; do
                remote="${file#./}"
                dir=$(dirname "$remote")
                if [ "$dir" != "." ]; then
                  echo "mkdir -p /$DIR/$dir"
                fi
                echo "put $file -o /$DIR/$remote"
              done
            echo "bye"
          } > "$SCRIPT"

          echo "--- lftp script preview (first 20 lines) ---"
          head -20 "$SCRIPT"
          echo "---------------------------------------------"

          lftp -f "$SCRIPT"
          echo "Deploy complete."
